name: Prepare fork repositories

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Fork listed repositories
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: prepare-fork-repos
  cancel-in-progress: false

jobs:
  plan:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_targets: ${{ steps.plan.outputs.has_targets }}
      target_count: ${{ steps.plan.outputs.target_count }}
    steps:
      - name: Check out index
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz

      - name: Plan fork repositories
        id: plan
        env:
          WEBRPG_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          LIMIT: "40"
          MAX_MATRIX_SIZE: "40"
          REVALIDATE_AFTER_HOURS: "168"
          RETRY_COOLDOWN_HOURS: "6"
        run: node scripts/plan-fork-repos.mjs

  process:
    needs: plan
    if: needs.plan.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Check out index
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Create repository-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: ${{ matrix.repo }}

      - name: Validate, prepare and enable Pages
        env:
          WEBRPG_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          REPO_NAME: ${{ matrix.repo }}
          DRY_RUN: "false"
          DELETE_INVALID_REPOS: "false"
          PAGES_SOURCE_PATH: /
          SITE_ORIGIN: https://777723-xyz.github.io
          RESULT_DIR: workflow-results
          HTML_MAX_FILES: "120"
          HTML_FETCH_CONCURRENCY: "5"
          GITHUB_API_TIMEOUT_MS: "30000"
        run: node scripts/process-fork-repo.mjs

      - name: Upload repository result
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: result-${{ matrix.repo }}
          path: workflow-results/*.json
          if-no-files-found: warn

  aggregate:
    needs:
      - plan
      - process
    if: always() && needs.plan.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create index repository token
        id: index-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: game-index-runner

      - name: Check out index
        uses: actions/checkout@v5
        with:
          token: ${{ steps.index-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download repository results
        uses: actions/download-artifact@v5
        with:
          pattern: result-*
          merge-multiple: true
          path: workflow-results

      - name: Update list metadata
        env:
          DRY_RUN: "false"
          RESULTS_DIR: workflow-results
        run: node scripts/update-list-from-results.mjs

      - name: Commit list metadata
        run: |
          git config user.name "webrpg-bot[bot]"
          git config user.email "webrpg-bot[bot]@users.noreply.github.com"
          git add list.json
          if git diff --cached --quiet; then
            echo "No list.json changes to commit."
          else
            git commit -m "Update fork validation metadata"
            git push
          fi

      - name: Create portal dispatch token
        id: portal-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: 777723-xyz.github.io

      - name: Trigger portal catalog deployment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.portal-token.outputs.token }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/777723-xyz/777723-xyz.github.io/dispatches \
            --data '{"event_type":"catalog-updated","client_payload":{"source":"game-index-runner"}}'
