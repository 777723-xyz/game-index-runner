name: Browser runtime smoke test

on:
  workflow_dispatch:
    inputs:
      batch_limit:
        description: Games to test in this batch (maximum 15)
        required: false
        default: "15"
        type: string
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: read

concurrency:
  group: browser-runtime-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Create index repository token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: game-index-runner

      - name: Check out index
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install runtime checker
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check browser runtime
        env:
          LIMIT: ${{ inputs.batch_limit || '15' }}
          CONCURRENCY: "5"
          RUNTIME_TIMEOUT_MS: "30000"
          RETRY_COOLDOWN_HOURS: "6"
          REVALIDATE_AFTER_HOURS: "168"
          DRY_RUN: "false"
        run: node scripts/runtime-smoke-test.mjs

      - name: Commit runtime status
        id: commit
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "webrpg-bot[bot]"
          git config user.email "webrpg-bot[bot]@users.noreply.github.com"
          git add list.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No runtime status changes."
          else
            git commit -m "Record browser runtime checks"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create portal dispatch token
        if: steps.commit.outputs.changed == 'true'
        id: portal-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: 777723-xyz.github.io

      - name: Trigger portal catalog deployment
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.portal-token.outputs.token }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/777723-xyz/777723-xyz.github.io/dispatches \
            --data '{"event_type":"catalog-updated","client_payload":{"source":"runtime-smoke-test"}}'
