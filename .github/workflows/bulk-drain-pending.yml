name: Bulk drain pending repositories

on:
  workflow_dispatch:
    inputs:
      batch_limit:
        description: Fork and process count per bulk batch
        required: false
        default: "100"
        type: string
      remaining_batches:
        description: Including this run; automatically decremented after each batch
        required: false
        default: "7"
        type: string

permissions:
  contents: read

concurrency:
  group: bulk-drain-pending
  cancel-in-progress: false

jobs:
  fork:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fork pending repositories
        env:
          WEBRPG_FORK_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          DRY_RUN: "false"
          LIMIT: ${{ inputs.batch_limit }}
          DEFAULT_BRANCH_ONLY: "false"
          INCLUDE_INVALID: "false"
          CREATE_DELAY_SECONDS: "4"
          RETRY_LIMIT: "5"
          RETRY_BASE_DELAY_SECONDS: "60"
        run: node scripts/fork-listed-repos.mjs

  plan:
    needs: fork
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_targets: ${{ steps.plan.outputs.has_targets }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Plan bulk validation
        id: plan
        env:
          WEBRPG_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          LIMIT: ${{ inputs.batch_limit }}
          MAX_MATRIX_SIZE: ${{ inputs.batch_limit }}
        run: node scripts/plan-fork-repos.mjs

  process:
    needs: plan
    if: needs.plan.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Create repository token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: ${{ matrix.repo }}
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate, prepare and enable Pages
        env:
          WEBRPG_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          REPO_NAME: ${{ matrix.repo }}
          DRY_RUN: "false"
          DELETE_INVALID_REPOS: "false"
          PAGES_SOURCE_PATH: /
          SITE_ORIGIN: https://777723-xyz.github.io
          RESULT_DIR: workflow-results
        run: node scripts/process-fork-repo.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-${{ matrix.repo }}
          path: workflow-results/*.json
          if-no-files-found: warn

  aggregate:
    needs: [plan, process]
    if: always() && needs.plan.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create index repository token
        id: index-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: game-index-runner
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.index-token.outputs.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
          path: workflow-results
      - name: Update list metadata
        env:
          DRY_RUN: "false"
          RESULTS_DIR: workflow-results
        run: node scripts/update-list-from-results.mjs
      - name: Commit list metadata
        run: |
          git config user.name "webrpg-bot[bot]"
          git config user.email "webrpg-bot[bot]@users.noreply.github.com"
          git add list.json
          git diff --cached --quiet || (git commit -m "Bulk update fork validation metadata" && git push)

  continue:
    needs: [fork, aggregate]
    if: always() && inputs.remaining_batches > 1
    runs-on: ubuntu-latest
    steps:
      - name: Create scheduler token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: game-index-runner
      - name: Start next bulk batch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BATCH_LIMIT: ${{ inputs.batch_limit }}
          REMAINING_BATCHES: ${{ inputs.remaining_batches }}
        run: |
          next=$((REMAINING_BATCHES - 1))
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/777723-xyz/game-index-runner/actions/workflows/bulk-drain-pending.yml/dispatches \
            --data "{\"ref\":\"main\",\"inputs\":{\"batch_limit\":\"${BATCH_LIMIT}\",\"remaining_batches\":\"${next}\"}}"
