name: Legacy index scheduler (manual only)

on:
  workflow_dispatch:
    inputs:
      run_now:
        description: Run the first cycle immediately
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: continuous-index-scheduler
  cancel-in-progress: false

jobs:
  scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Wait for next hourly minute 17
        if: github.event_name != 'workflow_dispatch' || inputs.run_now != true
        shell: bash
        run: |
          now=$(date +%s)
          hour_start=$(( now - now % 3600 ))
          next=$(( hour_start + 17 * 60 ))
          if [ "${next}" -le "${now}" ]; then next=$(( next + 3600 )); fi
          wait_seconds=$(( next - now ))
          echo "Waiting ${wait_seconds}s until minute 17."
          sleep "${wait_seconds}"

      - name: Create scheduler token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: game-index-runner

      - name: Dispatch Index workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/777723-xyz/game-index-runner/actions/workflows/index-github-rpgmaker-repos.yml/dispatches \
            --data '{"ref":"main"}'
