name: Fork listed repositories

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fork-listed-repos
  cancel-in-progress: false

jobs:
  fork:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz

      - name: Check out index
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fork repositories
        continue-on-error: true
        env:
          WEBRPG_FORK_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          DRY_RUN: "false"
          LIMIT: "40"
          DEFAULT_BRANCH_ONLY: "false"
          INCLUDE_INVALID: "false"
          CREATE_DELAY_SECONDS: "8"
          RETRY_LIMIT: "5"
          RETRY_BASE_DELAY_SECONDS: "60"
        run: node scripts/fork-listed-repos.mjs
