name: Continuous fork scheduler

on:
  workflow_dispatch:
    inputs:
      run_now:
        description: Run the first cycle immediately
        required: false
        default: true
        type: boolean
  repository_dispatch:
    types:
      - continue-fork-scheduler

permissions:
  contents: read

concurrency:
  group: continuous-fork-scheduler
  cancel-in-progress: false

jobs:
  scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Wait for next half-hour boundary
        if: github.event_name != 'workflow_dispatch' || inputs.run_now != true
        shell: bash
        run: |
          now=$(date +%s)
          next=$(( (now / 1800 + 1) * 1800 ))
          wait_seconds=$(( next - now ))
          echo "Waiting ${wait_seconds}s until the next 30-minute boundary."
          sleep "${wait_seconds}"

      - name: Create scheduler token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: game-index-runner

      - name: Dispatch Fork workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/777723-xyz/game-index-runner/actions/workflows/fork-listed-repos.yml/dispatches \
            --data '{"ref":"main"}'

      - name: Start next scheduler cycle
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/777723-xyz/game-index-runner/dispatches \
            --data '{"event_type":"continue-fork-scheduler"}'
