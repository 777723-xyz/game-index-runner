name: Compare upstream WebRPG index

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Index GitHub RPG Maker repositories
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: compare-upstream-webrpg-index
  cancel-in-progress: false

jobs:
  compare:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Compare catalogs
        run: node scripts/compare-upstream-list.mjs
      - name: Commit comparison report
        run: |
          git config user.name "777723-index-bot[bot]"
          git config user.email "777723-index-bot[bot]@users.noreply.github.com"
          git add reports/upstream-list-comparison.json
          git diff --cached --quiet || git commit -m "chore: compare upstream WebRPG index"
          git push
