name: Manual catch-up batch (safe limit)

on:
  workflow_dispatch:
    inputs:
      batch_limit:
        description: Fork and process count for this manual batch (maximum 40)
        required: false
        default: "40"
        type: string

permissions:
  contents: read

concurrency:
  group: bulk-drain-pending
  cancel-in-progress: false

jobs:
  fork:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Fork pending repositories
        env:
          WEBRPG_FORK_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          DRY_RUN: "false"
          LIMIT: ${{ inputs.batch_limit }}
          DEFAULT_BRANCH_ONLY: "false"
          INCLUDE_INVALID: "false"
          CREATE_DELAY_SECONDS: "4"
          RETRY_LIMIT: "5"
          RETRY_BASE_DELAY_SECONDS: "60"
        run: node scripts/fork-listed-repos.mjs

  plan:
    needs: fork
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_targets: ${{ steps.plan.outputs.has_targets }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Plan bulk validation
        id: plan
        env:
          WEBRPG_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          LIMIT: ${{ inputs.batch_limit }}
          MAX_MATRIX_SIZE: ${{ inputs.batch_limit }}
          REVALIDATE_AFTER_HOURS: "168"
          RETRY_COOLDOWN_HOURS: "6"
        run: node scripts/plan-fork-repos.mjs

  process:
    needs: plan
    if: needs.plan.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Create repository token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: ${{ matrix.repo }}
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Validate, prepare and enable Pages
        env:
          WEBRPG_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: 777723-xyz
          REPO_NAME: ${{ matrix.repo }}
          DRY_RUN: "false"
          DELETE_INVALID_REPOS: "false"
          PAGES_SOURCE_PATH: /
          SITE_ORIGIN: https://777723-xyz.github.io
          RESULT_DIR: workflow-results
          HTML_MAX_FILES: "120"
          HTML_FETCH_CONCURRENCY: "5"
          GITHUB_API_TIMEOUT_MS: "30000"
        run: node scripts/process-fork-repo.mjs
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: result-${{ matrix.repo }}
          path: workflow-results/*.json
          if-no-files-found: warn

  aggregate:
    needs: [plan, process]
    if: always() && needs.plan.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create index repository token
        id: index-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: game-index-runner
      - uses: actions/checkout@v5
        with:
          token: ${{ steps.index-token.outputs.token }}
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - uses: actions/download-artifact@v5
        with:
          pattern: result-*
          merge-multiple: true
          path: workflow-results
      - name: Update list metadata
        env:
          DRY_RUN: "false"
          RESULTS_DIR: workflow-results
        run: node scripts/update-list-from-results.mjs
      - name: Commit list metadata
        run: |
          git config user.name "webrpg-bot[bot]"
          git config user.email "webrpg-bot[bot]@users.noreply.github.com"
          git add list.json
          git diff --cached --quiet || (git commit -m "Bulk update fork validation metadata" && git push)

      - name: Create portal dispatch token
        id: portal-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: 777723-xyz
          repositories: 777723-xyz.github.io

      - name: Trigger portal catalog deployment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.portal-token.outputs.token }}
        run: |
          curl --fail-with-body --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/777723-xyz/777723-xyz.github.io/dispatches \
            --data '{"event_type":"catalog-updated","client_payload":{"source":"game-index-runner"}}'
